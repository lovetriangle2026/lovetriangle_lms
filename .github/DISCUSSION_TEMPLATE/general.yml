name: Daily Meeting
description: Record the daily team meeting
title: "[Daily Meeting] "

body:
  - type: input
    attributes:
      label: 📅 회의 날짜
      description: 회의 날짜를 입력하세요
      placeholder: 예) 2026-03-17
    validations:
      required: true

  - type: textarea
    attributes:
      label: 👥 참석자
      description: 회의에 참석한 팀원
      placeholder: 예) 유지, 민서, 철수
    validations:
      required: true

  - type: textarea
    attributes:
      label: 📌 오늘 논의한 내용
      description: 오늘 회의에서 논의한 내용
      placeholder: |
        - 기능 설계 논의
        - DB 구조 논의
    validations:
      required: true

  - type: textarea
    attributes:
      label: ✅ 결정된 사항
      description: 회의에서 결정된 내용
      placeholder: |
        - 로그인 API 먼저 구현
        - DB 테이블 수정

  - type: textarea
    attributes:
      label: 🚀 다음 할 일
      description: 다음 회의 전까지 할 일
      placeholder: |
        - JWT 인증 구현
        - ERD 수정