title: "[Daily Meeting] "
body:
  - type: markdown
    attributes:
      value: |
        팀 데일리 회의 기록용 템플릿입니다.

  - type: input
    id: meeting_date
    attributes:
      label: 📅 회의 날짜
      description: 회의 날짜를 입력하세요
      placeholder: 예) 2026-03-17
    validations:
      required: true

  - type: textarea
    id: attendees
    attributes:
      label: 👥 참석자
      description: 회의에 참석한 팀원
      placeholder: 예) 유지, 민서, 철수
    validations:
      required: true

  - type: textarea
    id: discussed
    attributes:
      label: 📌 오늘 논의한 내용
      description: 오늘 회의에서 논의한 내용
      placeholder: |
        - 기능 설계 논의
        - DB 구조 논의
    validations:
      required: true

  - type: textarea
    id: decisions
    attributes:
      label: ✅ 결정된 사항
      description: 회의에서 결정된 내용
      placeholder: |
        - 로그인 API 먼저 구현
        - ERD 수정

  